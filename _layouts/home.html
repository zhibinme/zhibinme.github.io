---
layout: default
---

<div>
  {%- if page.title -%}
    <h1 class="mb-2 md:mb-4 xl:mb-6 text-lg font-bold">{{ page.title }}</h1>
  {%- endif -%}

  {%- if page.list_title -%}
    <h2 class="mb-2 md:mb-4 xl:mb-6 text-md font-bold">{{ page.list_title }}</h2>
  {%- endif -%}

  {%- if site.posts.size > 0 -%}
    {%- include ariticle-list.html posts=site.posts -%}
  {%- endif -%}

  {{ content }}

</div>
